name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 flake8-bugbear

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=.git,__pycache__,*.egg-info \
            --extend-ignore=E203,W503

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          # Tkinter and virtual display for GUI client tests
          sudo apt-get install -y \
            python3-tk \
            xvfb \
            libxcb1 \
            libxcb-util1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Import sanity checks
        run: |
          python -c "import core.protocol"
          python -c "import core.server"
          python -c "import core.client_base"
          python -c "import utils.crypto"
          python -c "import utils.portable"
          python -c "import config.settings"

      - name: Run tests (headless)
        env:
          DISPLAY: ":99"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 1
          pytest tests/ \
            --timeout=30 \
            --cov=core \
            --cov=utils \
            --cov=config \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  server-startup:
    name: Server smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test - server starts and binds
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Start server in background, give it 3 seconds, then confirm it bound a port
          timeout 5 python chat.py --server --port 9999 &
          SERVER_PID=$!
          sleep 3
          if ss -tlnp | grep -q ':9999'; then
            echo "Server successfully bound to port 9999"
            kill $SERVER_PID 2>/dev/null || true
          else
            echo "Server did not bind to expected port"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi