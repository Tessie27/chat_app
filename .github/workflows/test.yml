name: Secure Chat Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cryptography pytest pytest-cov

    - name: Install Windows curses (Windows only)
      if: runner.os == 'Windows'
      run: pip install windows-curses

    - name: Check Python version
      run: python --version

    - name: Test Tkinter availability
      run: python -c "import tkinter; print('Tkinter available')"
      continue-on-error: true

    - name: Test cryptography import
      run: python -c "from cryptography.fernet import Fernet; print('Cryptography available')"

    - name: Test core protocol module
      run: python -c "from core.protocol import SecureProtocol, send, recv, ts; print('Protocol module loaded')"

    - name: Test client base module
      run: python -c "from core.client_base import ChatClientBase; print('Client base loaded')"

    - name: Test crypto utils module
      run: python -c "from utils.crypto import CryptoUtils, MessageEncryptor; print('Crypto utils loaded')"

    - name: Test portable utils module
      run: python -c "from utils.portable import is_portable, get_config_dir; print('Portable utils loaded')"

    - name: Test settings module
      run: python -c "from config.settings import Settings; print('Settings loaded')"

  server-test:
    name: Server Startup Test
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install cryptography

    - name: Start server
      run: |
        python chat.py server &
        sleep 5

    - name: Check if server is running
      run: |
        if curl -s --head --fail --max-time 5 http://127.0.0.1:5555; then
          echo "Server is running"
          exit 0
        else
          echo "Server failed to start"
          exit 1
        fi
      continue-on-error: true

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: pip install black flake8

    - name: Check formatting with Black
      run: black --check .

    - name: Lint with Flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install safety
      run: pip install safety

    - name: Generate requirements file
      run: pip freeze > requirements-dev.txt

    - name: Check dependencies for vulnerabilities
      run: safety check -r requirements-dev.txt --full-report
      continue-on-error: true

  build-portable:
    name: Build Portable Package
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Create portable package
      run: |
        mkdir -p dist/secure-chat
        cp -r core clients utils config *.py requirements.txt README.md dist/secure-chat/
        cd dist
        zip -r secure-chat-portable.zip secure-chat/

    - name: Upload portable package
      uses: actions/upload-artifact@v4
      with:
        name: secure-chat-portable
        path: dist/secure-chat-portable.zip